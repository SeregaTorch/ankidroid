name: Build AnkiDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🐍 Установить Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Установить системные зависимости
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            ccache
          sudo apt autoremove -y

      - name: 📦 Установить Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🔨 Инициализировать Buildozer (первый раз)
        working-directory: ./ankidroid
        run: |
          mkdir -p bin
          # Проверим, что buildozer видит Python
          python3 --version
          pip3 show buildozer

      - name: 🔨 Собрать APK (первая сборка ~40-60 мин)
        working-directory: ./ankidroid
        run: |
          buildozer android debug 2>&1 || true
          # Показываем логи если папка .buildozer есть
          ls -la .buildozer/ 2>/dev/null || echo "No .buildozer dir"

      - name: 🔍 Найти APK
        working-directory: ./ankidroid
        run: |
          find . -name "*.apk" -type f 2>/dev/null || echo "APK not found"
          ls -la bin/ 2>/dev/null || echo "bin dir not found"

      - name: 📤 Загрузить APK (если собран)
        uses: actions/upload-artifact@v4
        with:
          name: ankidroid-apk
          path: ankidroid/bin/*.apk
        continue-on-error: true
