name: Build AnkiDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🐍 Установить Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Установить системные зависимости
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev

      - name: 📦 Установить Buildozer
        run: |
          pip install --user buildozer cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🔨 Собрать APK
        run: |
          cd ankidroid
          buildozer android debug

      - name: 📤 Загрузить APK
        uses: actions/upload-artifact@v4
        with:
          name: ankidroid-apk
          path: ankidroid/bin/*.apk
