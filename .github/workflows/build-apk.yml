name: Build AnkiDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🐍 Установить Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Установить системные зависимости
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            ccache autoconf-archive

      - name: 📦 Установить Buildozer
        run: |
          pip install buildozer cython==0.29.37 setuptools

      - name: 🔍 Структура файлов
        run: |
          ls -la

      - name: 🔨 Собрать APK
        run: |
          yes | buildozer android debug 2>&1

      - name: 📄 Показать лог Buildozera (если ошибка)
        if: failure()
        run: |
          cat .buildozer/buildozer.log 2>/dev/null || echo "Лог не найден"
          find . -name "*.apk" -type f 2>/dev/null || echo "APK не найден"

      - name: 📤 Загрузить APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ankidroid-apk
          path: bin/*.apk
