name: Build AnkiDroid APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Скачать код
        uses: actions/checkout@v4

      - name: 🐍 Установить Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Установить системные зависимости
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            ccache

      - name: 📦 Установить Buildozer
        run: |
          pip install buildozer cython

      - name: 🔍 Показать версии
        run: |
          python3 --version
          which python3
          buildozer --version

      - name: 🔨 Собрать APK
        working-directory: ./ankidroid
        run: |
          python3 -m buildozer android debug 2>&1

      - name: 📄 Показать лог Buildozera (если есть)
        if: failure()
        working-directory: ./ankidroid
        run: |
          cat .buildozer/buildozer.log 2>/dev/null || echo "Лог не найден"
          find . -name "*.apk" -type f 2>/dev/null || echo "APK не найден"

      - name: 📤 Загрузить APK (если собран)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ankidroid-apk
          path: ankidroid/bin/*.apk
